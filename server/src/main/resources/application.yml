spring:
  application:
    name: "server"
  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:5432/fms"
    username: "${DB_USERNAME:postgres}"
    password: "${DB_PASSWORD}"
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: ${REDIS_PORT:6379}
      password: "${REDIS_PASSWORD}"
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

aliyun:
  iot:
    amqp:
      uid: "${ALIYUN_UID}"
      access-key: "${ALIYUN_ACCESS_KEY}"
      access-secret: "${ALIYUN_ACCESS_SECRET}"
      consumer-group-id: "${ALIYUN_CONSUMER_GROUP_ID:DEFAULT_GROUP}"
      region: "${ALIYUN_REGION:cn-shanghai}"
      iot-instance-id: "${ALIYUN_IOT_INSTANCE_ID}"
